   .app {

    h1 {

    }

    .controls {

      gap: 0.75rem;

    }

 button {
  border: none;
  border-radius: 12px;
  padding: 0.65rem 1.2rem;
  font-size: 0.95rem;
  cursor: pointer;
  transition: 0.2s ease;
}

button.primary {
  background: linear-gradient(135deg, #2563eb, #3b82f6);
  color: white;
  box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
}

button.primary:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 16px rgba(59, 130, 246, 0.5);
}

button.secondary {
  background: #e5e7eb;
  color: #111827;
}

button.secondary:hover {
  transform: scale(1.05);
  background: #d1d5db;
}

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .questions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .question-card {
      border-radius: 0.9rem;
      border: 1px solid #e5e7eb;
      padding: 0.9rem 1rem;
      background: #f9fafb;
    }

    .question-header {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      margin-bottom: 0.6rem;
    }

    .question-number {
      font-weight: 600;
      font-size: 0.85rem;
      color: #6b7280;
      padding: 0.25rem 0.5rem;
      border-radius: 999px;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .question-text {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .answer-option {
      display: flex;
      align-items: flex-start;
      gap: 0.45rem;
      padding: 0.35rem 0.5rem;
      border-radius: 0.5rem;
      transition: background 0.15s, transform 0.05s;
      cursor: pointer;
    }

    .answer-option:hover {
      background: #e5e7eb;
      transform: translateY(-1px);
    }

    .answer-option input {
      margin-top: 0.15rem;
      cursor: pointer;
    }

    .answer-text {
      font-size: 0.9rem;
    }

    .answer-option.correct {
      background: #dcfce7;
      border: 1px solid #16a34a;
    }

    .answer-option.incorrect {
      background: #fee2e2;
      border: 1px solid #dc2626;
    }

    .answer-option.unselected-correct {
      background: #ecfdf5;
      border: 1px dashed #16a34a;
    }

    .results {
      margin-top: 1.4rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.95rem;
    }

    .score {
      font-weight: 600;
    }

    .score.good { color: #16a34a; }
    .score.medium { color: #f59e0b; }
    .score.bad { color: #dc2626; }

    .info-text {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 0.5rem;
      text-align: center;
    }

    @media (max-width: 640px) {
      .app { padding: 1rem; border-radius: 0.75rem; }
      .question-card { padding: 0.8rem 0.75rem; }
    }

    body {
      margin: 0;
      padding: 1.5rem;
      display: flex;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.70);
      backdrop-filter: blur(2px);
      z-index: -1;
    }
  </style>
</head>

    function shuffleArray(array) {
      return array
        .map(value => ({ value, sort: Math.random() }))
        .sort((a, b) => a.sort - b.sort)
        .map(({ value }) => value);
    }

      quizState = questionsData.map((q, index) => {
        const shuffledAnswers = shuffleArray([...q.answers]);
        const questionId = "q" + index;
        const card = document.createElement("div");
        card.className = "question-card";
        card.dataset.questionId = questionId;

        const header = document.createElement("div");
        header.className = "question-header";

        const num = document.createElement("div");
        num.className = "question-number";
        num.textContent = "Pregunta " + (index + 1);

        const text = document.createElement("div");
        text.className = "question-text";
        text.textContent = q.text;

        header.appendChild(num);
        header.appendChild(text);

        const answersDiv = document.createElement("div");
        answersDiv.className = "answers";

        shuffledAnswers.forEach((ans, ansIndex) => {
          const label = document.createElement("label");
          label.className = "answer-option";

          const input = document.createElement("input");
          input.type = "radio";
          input.name = questionId;
          input.value = ansIndex;
          input.dataset.correct = ans.correct ? "true" : "false";

          const span = document.createElement("span");
          span.className = "answer-text";
          span.textContent = ans.text;

          label.appendChild(input);
          label.appendChild(span);
          answersDiv.appendChild(label);
        });

        card.appendChild(header);
        card.appendChild(answersDiv);
        questionsContainer.appendChild(card);

        return { questionId, element: card };
      });
    }

    function gradeQuiz() {
      let correctCount = 0;
      let unanswered = 0;

      quizState.forEach((q) => {
        const card = q.element;
        const options = card.querySelectorAll(".answer-option");
        let selectedInput = null;

        options.forEach(opt => {
          const input = opt.querySelector("input");
          opt.classList.remove("correct", "incorrect", "unselected-correct");
          if (input.checked) selectedInput = input;
        });

        if (!selectedInput) {
          unanswered++;
        } else if (selectedInput.dataset.correct === "true") {
          correctCount++;
        }

        options.forEach(opt => {
          const input = opt.querySelector("input");
          input.disabled = true;

          if (input.dataset.correct === "true" && input.checked) {
            opt.classList.add("correct");
          } else if (input.dataset.correct === "false" && input.checked) {
            opt.classList.add("incorrect");
          } else if (input.dataset.correct === "true" && !input.checked) {
            opt.classList.add("unselected-correct");
          }
        });
      });

      const total = questionsData.length;
      const percentage = (correctCount / total) * 100;

      let gradeClass = "bad";
      if (percentage >= 80) gradeClass = "good";
      else if (percentage >= 50) gradeClass = "medium";

      scoreText.className = "score " + gradeClass;
      scoreText.textContent = `Resultado: ${correctCount} de ${total} (${percentage.toFixed(1)}%)`;

      let detail = "";
      if (unanswered > 0) detail += `Preguntas sin responder: ${unanswered}. `;
      if (percentage >= 80) detail += "Muy buen trabajo, dominas el tema ✅";
      else if (percentage >= 50) detail += "Nada mal, pero puedes repasar algunos conceptos 👍";
      else detail += "Te conviene repasar el contenido antes del examen 📚";

      detailText.textContent = detail;
      resultsBox.style.display = "flex";
      checkBtn.disabled = true;
    }

    checkBtn.addEventListener("click", gradeQuiz);
    resetBtn.addEventListener("click", buildQuiz);

    buildQuiz();
  </script>
</body>
</html>
