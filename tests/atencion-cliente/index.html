 button {

  background: #d1d5db;
}


    button:disabled {

      box-shadow: none;
    }

    .questions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

      border: 1px solid #e5e7eb;
      padding: 0.9rem 1rem;
      background: #f9fafb;
    }

    .question-header {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      margin-bottom: 0.6rem;
    }

    .question-number {
      font-weight: 600;
      font-size: 0.85rem;
      color: #6b7280;
      padding: 0.25rem 0.5rem;

      background: #e5e7eb;

    }

      font-size: 0.95rem;
      font-weight: 500;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .answer-option {
      display: flex;
      align-items: flex-start;
      gap: 0.45rem;
      padding: 0.35rem 0.5rem;
      border-radius: 0.5rem;
      transition: background 0.15s, transform 0.05s;
      cursor: pointer;
    }

    .answer-option:hover {
      background: #e5e7eb;
      transform: translateY(-1px);
    }

    .answer-option input {
      margin-top: 0.15rem;
      cursor: pointer;
    }

    .answer-text {
      font-size: 0.9rem;
    }

    /* Estados tras corregir */
    .answer-option.correct {
      background: #dcfce7;
      border: 1px solid #16a34a;
    }

    .answer-option.incorrect {
      background: #fee2e2;
      border: 1px solid #dc2626;
    }

    .answer-option.unselected-correct {
      background: #ecfdf5;
      border: 1px dashed #16a34a;
    }

    .results {
      margin-top: 1.4rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.95rem;
    }

    .score {
      font-weight: 600;
    }

    .score.good {
      color: #16a34a;
    }

    .score.medium {
      color: #f59e0b;
    }

    .score.bad {
      color: #dc2626;
    }

      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 0.5rem;
      text-align: center;

    @media (max-width: 640px) {
      .app {
        padding: 1rem;
        border-radius: 0.75rem;
      }

      .question-card {

      }

          { text: "Obligan a la empresa a formar a los profesionales que los componen.", correct: false },
          { text: "Requieren un acuerdo de contratación claro en cuanto a los términos en los que se prestará el servicio.", correct: true },
          { text: "Contactan con los empleados para ver cómo se sienten", correct: false }
        ]
      },
      {
        text: "Los mecanismos que permiten a los ciudadanos relacionarse con las administraciones son:",
        answers: [
          { text: "Los actos administrativos.", correct: false },
          { text: "Las denuncias, las instancias generales y los recursos administrativos.", correct: true },
          { text: "El derecho de petición, recogido en el artículo 29 de la Constitución.", correct: false },
          { text: "Los recogidos en la Ley 11/2011, de 20 de mayo, de regulación institucional en la Administración General del Estado.", correct: false }
        ]
      },
      {
        text: "Una persona física que se hace con determinados bienes o servicios para hacer un uso personal de los mismos, sin ninguna pretensión de incorporarlos a posteriores actividades lucrativas es:",
        answers: [
          { text: "Un cliente", correct: false },
          { text: "Un consumidor", correct: true },
          { text: "Un usuario", correct: false },
          { text: "Comprador", correct: false }
        ]
      },
      {
        text: "Uno de los aspectos destacados que se recogen en el contenido de la LOPD es:",
        answers: [
          { text: "La exactitud de los datos.", correct: true },
          { text: "La solución de conflictos.", correct: false },
          { text: "El deber de compatibilidad.", correct: false },
          { text: "La autorización para la divulgación de los datos recopilados.", correct: false }
        ]
      }
    ];
    // =====================================
    // 2. LÓGICA DEL TEST (NO TOCAR SI NO HACE FALTA)
    // =====================================

    const questionsContainer = document.getElementById("questionsContainer");
    
    
    const resultsBox = document.getElementById("results");
    const scoreText = document.getElementById("scoreText");
    const detailText = document.getElementById("detailText");

    let quizState = [];

    function shuffleArray(array) {
      return array
        .map(value => ({ value, sort: Math.random() }))
        .sort((a, b) => a.sort - b.sort)
        .map(({ value }) => value);
    }

    function buildQuiz() {
      questionsContainer.innerHTML = "";
      resultsBox.style.display = "none";
      document.getElementById("fabCheck").classList.remove("hidden");

      quizState = questionsData.map((q, index) => {
        const shuffledAnswers = shuffleArray([...q.answers]);
        const questionId = "q" + index;
        const card = document.createElement("div");
        card.className = "question-card";
        card.dataset.questionId = questionId;

        const header = document.createElement("div");
        header.className = "question-header";

        const num = document.createElement("div");
        num.className = "question-number";
        num.textContent = "Pregunta " + (index + 1);

        const text = document.createElement("div");
        text.className = "question-text";
        text.textContent = q.text;

        header.appendChild(num);
        header.appendChild(text);

        const answersDiv = document.createElement("div");
        answersDiv.className = "answers";

        shuffledAnswers.forEach((ans, ansIndex) => {
          const label = document.createElement("label");
          label.className = "answer-option";

          const input = document.createElement("input");
          input.type = "radio";
          input.name = questionId;
          input.value = ansIndex;
          input.dataset.correct = ans.correct ? "true" : "false";

          const span = document.createElement("span");
          span.className = "answer-text";
          span.textContent = ans.text;

          label.appendChild(input);
          label.appendChild(span);
          answersDiv.appendChild(label);
        });

        card.appendChild(header);
        card.appendChild(answersDiv);
        questionsContainer.appendChild(card);

        return {
          questionId,
          element: card
        };
      });
    }

    function gradeQuiz() {
      let correctCount = 0;
      let unanswered = 0;

      quizState.forEach((q) => {
        const card = q.element;
        const options = card.querySelectorAll(".answer-option");
        let selectedInput = null;

        options.forEach(opt => {
          const input = opt.querySelector("input");
          opt.classList.remove("correct", "incorrect", "unselected-correct");
          if (input.checked) selectedInput = input;
        });

        if (!selectedInput) {
          unanswered++;
        } else if (selectedInput.dataset.correct === "true") {
          correctCount++;
        }

        // Marcar visualmente correctas / incorrectas
        options.forEach(opt => {
          const input = opt.querySelector("input");
          input.disabled = true;

          if (input.dataset.correct === "true" && input.checked) {
            opt.classList.add("correct");
          } else if (input.dataset.correct === "false" && input.checked) {
            opt.classList.add("incorrect");
          } else if (input.dataset.correct === "true" && !input.checked) {
            opt.classList.add("unselected-correct");
          }
        });
      });

      const total = questionsData.length;
      const percentage = (correctCount / total) * 100;

      let gradeClass = "bad";
      if (percentage >= 80) gradeClass = "good";
      else if (percentage >= 50) gradeClass = "medium";

      scoreText.className = "score " + gradeClass;
      scoreText.textContent = `Resultado: ${correctCount} de ${total} (${percentage.toFixed(1)}%)`;

      let detail = "";
      if (unanswered > 0) {
        detail += `Preguntas sin responder: ${unanswered}. `;
      }
      if (percentage >= 80) {
        detail += "Muy buen trabajo, dominas el tema ✅";
      } else if (percentage >= 50) {
        detail += "Nada mal, pero puedes repasar algunos conceptos 👍";
      } else {
        detail += "Te conviene repasar el contenido antes del examen 📚";
      }

      detailText.textContent = detail;
      resultsBox.style.display = "flex";
      document.getElementById("fabCheck").classList.add("hidden");
    }

    document.getElementById("fabCheck").addEventListener("click", gradeQuiz);
    document.getElementById("fabReset").addEventListener("click", buildQuiz);

    // Construir el test al cargar
    buildQuiz();
    }); // DOMContentLoaded
  </script>

  <div class="fab-wrap">
    <button class="fab-reset" id="fabReset">↺ Reiniciar</button>
    <button class="fab-check" id="fabCheck">✔ Corregir</button>
  </div>
</body>
</html>
